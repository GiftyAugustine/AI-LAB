<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredient Glossary - SmartKitchen.AI</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glossary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 500px;
        }

        .search-container input {
            width: 100%;
            padding: 1rem 1.5rem 1rem 3.5rem;
            background: var(--surface-color);
            border: var(--glass-border);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-container input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.2);
        }

        .search-container i {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .glossary-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 3rem;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 15px;
            border: var(--glass-border);
        }

        .alphabet-link {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .alphabet-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .alphabet-link.active {
            background: var(--secondary-gradient);
            color: white;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3);
        }

        .glossary-section {
            margin-bottom: 4rem;
            scroll-margin-top: 2rem;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #4facfe;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, rgba(79, 172, 254, 0.5), transparent);
        }

        .ingredient-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .ingredient-item {
            background: rgba(255, 255, 255, 0.05);
            border: var(--glass-border);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .ingredient-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .ingredient-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .ingredient-count {
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-main">
                <div class="logo">
                    <a href="/" style="text-decoration: none; color: inherit;">
                        <i class="fa-solid fa-robot"></i> SmartKitchen<span class="highlight">.AI</span>
                    </a>
                </div>
                <div class="nav-links">
                    <a href="/static/index.html" class="nav-btn">
                        <i class="fa-solid fa-chevron-left"></i> Back to Home
                    </a>
                </div>
            </div>
            <p class="subtitle">Complete ingredient registry from our 1M+ recipe dataset</p>
        </header>

        <div class="glossary-header">
            <h1 style="margin: 0; font-size: 2rem;">Alphabetical Index</h1>
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="glossary-search" placeholder="Search ingredients...">
            </div>
        </div>

        <nav class="glossary-nav" id="alphabet-nav">
            <!-- Alphabet links injected by JS -->
        </nav>

        <div id="glossary-container">
            <!-- Glossary sections injected by JS -->
            <div class="spinner-container" style="text-align: center; padding: 5rem;">
                <div class="spinner"></div>
                <p>Loading glossary...</p>
            </div>
        </div>
    </div>

    <script src="/static/glossary.js"></script>
</body>

</html>
