<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartKitchen.AI</title>

  <!-- Fonts -->

  <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">


  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <!-- Left Section -->
    <div class="left">
      <h1 class="logo">SMARTKITCHEN. AI</h1>

      <p class="tagline">From image to recipe in seconds</p>

      <a href="upload.html" class="upload-btn">
        Tap to upload a photo of your ingredients
      </a>

      <p class="footer">We use a Vision-Language Model (VLM) to detect ingredients.</p>
    </div>

    <!-- Orange Divider -->
    <div class="divider"></div>

    <!-- Right Section (Video) -->
    <div class="right">
      <video autoplay muted loop playsinline>
        <source src="cooking_video.mp4" type="video/mp4">
      </video>

      <div class="overlay-text">
        <h1>
        <span>COOK</span> 
        <span>LIKE</span> 
        <span>A </span>
        <span>PRO</span>
        </h1>
      </div>

    </div>
  </div>
</body>
</html>
